<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI governance architecture explained for developers and non-developers.">
  <title>AI Governance v0.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <strong class="brand">AI Governance</strong>
      <div class="lang-wrap">
        <label for="lang-select" data-i18n="languageLabel"></label>
        <select id="lang-select" aria-label="Language selector">
          <option value="en">English</option>
          <option value="ko">한국어</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero-shell">
      <section class="hero card">
        <p class="eyebrow" data-i18n="eyebrow"></p>
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>
        <div class="hero-ribbon">
          <span class="ribbon-chip">v0.7</span>
          <span class="ribbon-chip">API Telemetry</span>
          <span class="ribbon-chip">Continuous Monitoring</span>
        </div>
      </section>
      <aside class="hero-stack">
        <article class="card stat-card">
          <span class="stat-kicker">Core</span>
          <strong class="stat-value">5</strong>
          <span class="stat-copy">fixed departments in one state machine</span>
        </article>
        <article class="card stat-card">
          <span class="stat-kicker">Service Surface</span>
          <strong class="stat-value">3</strong>
          <span class="stat-copy">governance + orchestration + prompts</span>
        </article>
        <article class="card stat-card accent-card">
          <span class="stat-kicker">Release Rule</span>
          <strong class="stat-value">0</strong>
          <span class="stat-copy">missing scans tolerated before release</span>
        </article>
      </aside>
    </section>

    <section class="card spotlight-card">
      <h2 data-i18n="hierarchyTitle"></h2>
      <div class="hierarchy-grid">
        <article class="hierarchy-card">
          <h3 data-i18n="hierarchyCoreTitle"></h3>
          <ul id="hierarchy-core-list"></ul>
        </article>
        <article class="hierarchy-card">
          <h3 data-i18n="hierarchySubTitle"></h3>
          <ul id="hierarchy-sub-list"></ul>
        </article>
        <article class="hierarchy-card">
          <h3 data-i18n="hierarchyFlowTitle"></h3>
          <ul id="hierarchy-flow-list"></ul>
        </article>
      </div>
    </section>

    <section class="story-grid">
      <article class="card story-card primary-story">
        <h2 data-i18n="whatTitle"></h2>
        <ul id="what-list"></ul>
      </article>
      <article class="card story-card">
        <h2 data-i18n="howTitle"></h2>
        <ul id="how-list"></ul>
      </article>
      <article class="card story-card">
        <h2 data-i18n="whyTitle"></h2>
        <ul id="why-list"></ul>
      </article>
    </section>

    <section class="timeline-grid">
      <section class="card timeline-card">
        <h2 data-i18n="flowTitle"></h2>
        <ol id="flow-list" class="flow-list"></ol>
      </section>

      <section class="card quickstart-card">
        <h2 data-i18n="quickstartTitle"></h2>
        <ol class="quickstart-list">
          <li data-i18n="quickstartStep1"></li>
          <li data-i18n="quickstartStep2"></li>
          <li data-i18n="quickstartStep3"></li>
        </ol>
      </section>
    </section>

    <section class="card demo-card">
      <div class="demo-head">
        <h2 data-i18n="demoTitle"></h2>
        <button id="run-demo" type="button" data-i18n="demoButton"></button>
      </div>
      <p data-i18n="demoNote"></p>

      <div class="preset-row">
        <span data-i18n="presetLabel"></span>
        <div class="preset-buttons">
          <button type="button" class="preset-btn" data-preset="safe" data-i18n="presetSafe"></button>
          <button type="button" class="preset-btn" data-preset="balanced" data-i18n="presetBalanced"></button>
          <button type="button" class="preset-btn" data-preset="risky" data-i18n="presetRisky"></button>
        </div>
      </div>

      <div class="sim-grid">
        <label>
          <span data-i18n="inputScenario"></span>
          <select id="scenario-input">
            <option value="ui_copy">UI Copy Update</option>
            <option value="new_api_capability">New External API Capability</option>
            <option value="prod_secret">Production Secret Rotation</option>
            <option value="policy_change">Policy Matrix Change</option>
          </select>
        </label>

        <label>
          <span data-i18n="inputRisk"></span>
          <select id="risk-input">
            <option value="low">low</option>
            <option value="medium" selected>medium</option>
            <option value="high">high</option>
          </select>
        </label>

        <label class="toggle">
          <input id="pii-input" type="checkbox">
          <span data-i18n="inputPii"></span>
        </label>

        <label class="toggle">
          <input id="external-input" type="checkbox">
          <span data-i18n="inputExternal"></span>
        </label>

        <label class="toggle">
          <input id="deterministic-input" type="checkbox" checked>
          <span data-i18n="inputDeterministic"></span>
        </label>
      </div>

      <section class="cockpit" aria-live="polite">
        <div class="cockpit-head">
          <h3 data-i18n="cockpitTitle"></h3>
          <span id="verdict-pill" class="verdict-pill"></span>
        </div>
        <div class="meter-wrap">
          <div class="meter-label">
            <strong data-i18n="riskMeterLabel"></strong>
            <span id="risk-meter-value"></span>
          </div>
          <div class="risk-meter">
            <div id="risk-meter-fill" class="risk-meter-fill"></div>
          </div>
        </div>
        <div class="cockpit-grid">
          <article>
            <h4 data-i18n="gateTitle"></h4>
            <ul id="gate-list" class="status-list"></ul>
          </article>
          <article>
            <h4 data-i18n="checksTitle"></h4>
            <ul id="checks-list" class="status-list"></ul>
          </article>
        </div>
      </section>

      <p class="decision-line"><strong data-i18n="decisionLabel"></strong> <span id="decision-summary"></span></p>
      <p id="recommendation-line" class="recommendation-line"></p>
      <section class="trace-box">
        <h4 data-i18n="traceTitle"></h4>
        <ul id="trace-list" class="trace-list"></ul>
      </section>
      <p id="delta-line" class="delta-line"></p>
      <p class="eval-meta">
        <strong data-i18n="evaluatedLabel"></strong>
        <span id="evaluated-at">-</span>
        <span class="dot">•</span>
        <strong data-i18n="runCountLabel"></strong>
        <span id="run-count">0</span>
      </p>
      <pre id="demo-output" aria-live="polite"></pre>
    </section>
  </main>

  <footer>
    <small data-i18n="footer"></small>
  </footer>

  <script src="assets/site.js"></script>
</body>
</html>
