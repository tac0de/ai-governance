<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Governance Central Control Room showcase and demo.">
  <title>AI Governance Central Control Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <header class="hero">
    <div class="noise"></div>
    <div class="hero-inner">
      <p class="eyebrow" data-i18n="eyebrow"></p>
      <h1 data-i18n="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
      <div class="topbar">
        <label for="lang-select" data-i18n="languageLabel"></label>
        <select id="lang-select" aria-label="Language selector">
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <section class="grid-section">
      <article class="panel">
        <h2 data-i18n="pillarsTitle"></h2>
        <ul id="pillars-list"></ul>
      </article>
      <article class="panel">
        <h2 data-i18n="rolesTitle"></h2>
        <ul id="roles-list"></ul>
      </article>
      <article class="panel">
        <h2 data-i18n="automationTitle"></h2>
        <ul id="automation-list"></ul>
      </article>
    </section>

    <section class="panel demo-panel">
      <div class="demo-head">
        <h2 data-i18n="demoTitle"></h2>
        <button id="run-demo" type="button" data-i18n="demoButton"></button>
      </div>
      <p class="demo-note" data-i18n="demoNote"></p>
      <pre id="demo-output" aria-live="polite"></pre>
    </section>

    <section class="panel">
      <h2 data-i18n="blogTitle"></h2>
      <div id="blog-list" class="blog-list"></div>
    </section>

    <section class="panel cta">
      <h2 data-i18n="nextTitle"></h2>
      <p data-i18n="nextText"></p>
      <div class="cta-links">
        <a id="readme-link" href="#" data-i18n="readmeLink"></a>
        <a id="services-registry-link" href="#" data-i18n="servicesRegistryLink"></a>
        <a id="mcps-registry-link" href="#" data-i18n="mcpsRegistryLink"></a>
      </div>
    </section>
  </main>

  <footer>
    <small data-i18n="footer"></small>
  </footer>

  <script src="assets/site.js"></script>
</body>
</html>
