name: deterministic-governance

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate governance contracts
        run: bash scripts/validate_all.sh
