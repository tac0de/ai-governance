name: "governance: autonomous sweep"

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:
    inputs:
      secret_tier:
        description: "Operating profile secret tier (OPM-V1): none | admin-only | repo-write"
        required: false
        default: admin-only
        type: string

permissions: read-all

concurrency:
  group: governance-autonomous-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    env:
      SECRET_TIER_INPUT: ${{ github.event.inputs.secret_tier }}
      SECRET_TIER_REPO_VAR: ${{ vars.SECRET_TIER }}
      OPENAI_ADMIN_API_KEY: ${{ secrets.OPENAI_ADMIN_API_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      ROLES_CHARTER_VERSION: v1
      OPM_VERSION: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce secrets tier gate
        run: |
          set -euo pipefail
          tier="${SECRET_TIER_INPUT:-${SECRET_TIER_REPO_VAR:-admin-only}}"
          if [ -z "$tier" ]; then
            tier="admin-only"
          fi
          case "$tier" in
            none)
              ;;
            admin-only)
              if [ -z "${OPENAI_ADMIN_API_KEY:-}" ]; then
                echo "Missing required secret for tier=admin-only: OPENAI_ADMIN_API_KEY"
                exit 1
              fi
              ;;
            repo-write)
              if [ -z "${OPENAI_ADMIN_API_KEY:-}" ] || [ -z "${REPO_ACCESS_TOKEN:-}" ]; then
                echo "Missing required secrets for tier=repo-write: OPENAI_ADMIN_API_KEY, REPO_ACCESS_TOKEN"
                exit 1
              fi
              ;;
            *)
              echo "Invalid SECRET_TIER: $tier"
              exit 1
              ;;
          esac
          echo "SECRET_TIER=$tier" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: control-plane/go/go.sum

      - name: Build control-plane runtime
        working-directory: control-plane/go
        run: |
          set -euo pipefail
          go build -o /tmp/cp-bin ./cmd/hub


      - name: Verify roles charter version tag
        run: |
          set -euo pipefail
          if [ "${ROLES_CHARTER_VERSION:-}" != "v1" ]; then
            echo "Sweep blocked: ROLES_CHARTER_VERSION must be v1"
            exit 1
          fi
          if ! grep -q "ROLES_CHARTER_VERSION=v1" constitution/charter/AI_GOVERNANCE_ROLES_V1.md; then
            echo "Sweep blocked: charter tag mismatch"
            exit 1
          fi


      - name: Verify operating profile version tag
        run: |
          set -euo pipefail
          if [ "${OPM_VERSION:-}" != "v1" ]; then
            echo "Sweep blocked: OPM_VERSION must be v1"
            exit 1
          fi
          if ! grep -q "OPM_VERSION=v1" constitution/policies/OPERATING_PROFILE_MATRIX_V1.md; then
            echo "Sweep blocked: operating profile tag mismatch"
            exit 1
          fi

      - name: Execute deterministic sweep
        run: |
          set -euo pipefail
          mkdir -p out/autonomous-sweep
          /tmp/cp-bin validate --plan constitution/cases/pass/case001.plan.json
          /tmp/cp-bin run --plan constitution/cases/pass/case001.plan.json --outdir out/autonomous-sweep
          /tmp/cp-bin audit \
            --plan constitution/cases/pass/case001.plan.json \
            --result out/autonomous-sweep/result.json \
            --evidence out/autonomous-sweep/evidence.json \
            --out out/autonomous-sweep/audit.json

      - name: Write sweep status artifact
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import pathlib
          import os

          base = pathlib.Path('out/autonomous-sweep')
          base.mkdir(parents=True, exist_ok=True)

          audit_path = base / 'audit.json'
          if audit_path.exists():
            audit = json.loads(audit_path.read_text())
            status = audit.get('status')
            reason_code = audit.get('reason_code')
            request_id = audit.get('request_id')
            checksums = audit.get('checksums', {})
          else:
            status = 'ERROR'
            reason_code = None
            request_id = None
            checksums = {}

          summary = {
            'checked_at': datetime.datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
            'status': status,
            'reason_code': reason_code,
            'request_id': request_id,
            'checksums': checksums,
            'mode': 'silent-signal-only',
            'opm_version': os.environ.get('OPM_VERSION', 'unknown'),
            'incident_hint': {
              'template': 'constitution/decision-log/INC-0001-template.md',
              'required_fields': [
                'workflow',
                'run_url',
                'reason_code',
                'root_cause',
                'fix_commit'
              ]
            }
          }

          payload = json.dumps(summary, sort_keys=True).encode('utf-8')
          summary['summary_hash'] = hashlib.sha256(payload).hexdigest()

          (base / 'status.json').write_text(json.dumps(summary, indent=2) + '\n')
          PY

      - name: Append step summary
        if: always()
        run: |
          set -euo pipefail
          status=$(python3 - <<'PY'
          import json
          print(json.load(open('out/autonomous-sweep/status.json'))['status'])
          PY
          )
          reason=$(python3 - <<'PY'
          import json
          v = json.load(open('out/autonomous-sweep/status.json')).get('reason_code')
          print(v if v is not None else 'null')
          PY
          )
          checked=$(python3 - <<'PY'
          import json
          print(json.load(open('out/autonomous-sweep/status.json'))['checked_at'])
          PY
          )
          opm=$(python3 - <<'PY'
          import json
          print(json.load(open('out/autonomous-sweep/status.json'))['opm_version'])
          PY
          )
          echo "## Autonomous Sweep" >> "$GITHUB_STEP_SUMMARY"
          echo "- checked_at: $checked" >> "$GITHUB_STEP_SUMMARY"
          echo "- secret_tier: ${SECRET_TIER:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- opm_version: $opm" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: $status" >> "$GITHUB_STEP_SUMMARY"
          echo "- reason_code: $reason" >> "$GITHUB_STEP_SUMMARY"
          echo "- issue/comment: none (silent mode)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-sweep-${{ github.run_id }}
          path: |
            out/autonomous-sweep/status.json
            out/autonomous-sweep/audit.json
            out/autonomous-sweep/result.json
            out/autonomous-sweep/evidence.json
            out/autonomous-sweep/logs/
