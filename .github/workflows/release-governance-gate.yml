name: "governance: release gate"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      approver_role:
        description: "Release approver role"
        required: false
        default: ControlPlaneOperator
        type: string
      secret_tier:
        description: "none | admin-only | repo-write"
        required: false
        default: admin-only
        type: string

permissions: read-all

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      APPROVER_ROLE: ${{ github.event.inputs.approver_role != '' && github.event.inputs.approver_role || vars.RELEASE_APPROVER_ROLE }}
      SECRET_TIER_INPUT: ${{ github.event.inputs.secret_tier }}
      SECRET_TIER_REPO_VAR: ${{ vars.SECRET_TIER }}
      OPENAI_ADMIN_API_KEY: ${{ secrets.OPENAI_ADMIN_API_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce secrets tier gate
        run: |
          set -euo pipefail
          tier="${SECRET_TIER_INPUT:-${SECRET_TIER_REPO_VAR:-admin-only}}"
          if [ -z "$tier" ]; then
            tier="admin-only"
          fi
          case "$tier" in
            none)
              ;;
            admin-only)
              if [ -z "${OPENAI_ADMIN_API_KEY:-}" ]; then
                echo "Missing required secret for tier=admin-only: OPENAI_ADMIN_API_KEY"
                exit 1
              fi
              ;;
            repo-write)
              if [ -z "${OPENAI_ADMIN_API_KEY:-}" ] || [ -z "${REPO_ACCESS_TOKEN:-}" ]; then
                echo "Missing required secrets for tier=repo-write: OPENAI_ADMIN_API_KEY, REPO_ACCESS_TOKEN"
                exit 1
              fi
              ;;
            *)
              echo "Invalid SECRET_TIER: $tier"
              exit 1
              ;;
          esac
          echo "SECRET_TIER=$tier" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: control-plane/go/go.sum

      - name: Build control-plane runtime
        working-directory: control-plane/go
        run: |
          set -euo pipefail
          go build -o /tmp/cp-bin ./cmd/hub

      - name: Run deterministic gate path
        run: |
          set -euo pipefail
          mkdir -p out/release-gate
          /tmp/cp-bin validate --plan constitution/cases/pass/case001.plan.json
          /tmp/cp-bin run --plan constitution/cases/pass/case001.plan.json --outdir out/release-gate
          /tmp/cp-bin audit \
            --plan constitution/cases/pass/case001.plan.json \
            --result out/release-gate/result.json \
            --evidence out/release-gate/evidence.json \
            --out out/release-gate/audit.json

      - name: Verify audit verdict
        run: |
          set -euo pipefail
          status=$(jq -r '.status' out/release-gate/audit.json)
          if [ "$status" != "PASS" ]; then
            echo "Release blocked: audit status=$status"
            exit 1
          fi

      - name: Verify release authority role
        run: |
          set -euo pipefail
          role="${APPROVER_ROLE:-}"
          if [ "$role" != "ControlPlaneOperator" ]; then
            echo "Release blocked: approver role must be ControlPlaneOperator (got: ${role:-<empty>})"
            exit 1
          fi
