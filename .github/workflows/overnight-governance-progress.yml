name: overnight-governance-progress

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  governance-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate governance contracts
        run: bash scripts/validate_all.sh

      - name: Run governance overnight report
        run: bash scripts/overnight_governance_report.sh

      - name: Commit governance report
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- reports/governance)" ]; then
            echo "No changes"
            exit 0
          fi
          git add reports/governance
          git commit -m "chore(progress): update overnight governance report"
          git push
