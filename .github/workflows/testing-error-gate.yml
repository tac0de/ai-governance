name: "main-hub: testing and error gate"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify mandatory governance files
        run: |
          set -euo pipefail
          test -s README.md
          test -s docs/55_OPERATING_CHARTER.md
          test -s docs/09_TESTING_AND_ERROR_PREVENTION.md
          test -s docs/72_TESTING_DEPARTMENT.md
          test -s docs/73_ERROR_MANAGEMENT_DEPARTMENT.md
          test -s docs/74_MCP_TASKFORCE.md
          test -s docs/75_FINANCE_ACCOUNTING_DEPARTMENT.md

      - name: Verify contract JSON parsing
        run: |
          set -euo pipefail
          for f in contracts/*.json; do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f"
          done

      - name: Verify TypeScript contract syntax
        run: |
          set -euo pipefail
          for f in contracts/*.ts; do
            node --check "$f"
          done

      - name: Verify workflow files exist and non-empty
        run: |
          set -euo pipefail
          ls .github/workflows/*.yml >/dev/null
          for f in .github/workflows/*.yml; do
            test -s "$f"
          done
