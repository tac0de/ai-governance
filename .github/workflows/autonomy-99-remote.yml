name: "main-hub: autonomy remote loop"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      require_session_valid:
        description: "reserved flag for future session checks"
        required: false
        default: "true"
      task_complexity:
        description: "low|high, high should remain human-reviewed"
        required: false
        default: "low"
      allow_high_tier:
        description: "allow non-nano model or higher output tokens: true|false"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  autonomy-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OpenAI runtime key in real-call mode
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REAL_CALL: ${{ vars.OPENAI_REAL_CALL }}
        run: |
          set -euo pipefail
          REAL_CALL="$(echo "${OPENAI_REAL_CALL:-false}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${REAL_CALL}" == "true" && -z "${OPENAI_API_KEY}" ]]; then
            echo "Missing secret OPENAI_API_KEY while OPENAI_REAL_CALL=true"
            exit 1
          fi

      - name: Prepare env file
        shell: bash
        run: |
          set -euo pipefail
          cp .env.example .env
          {
            echo "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
            echo "OPENAI_REAL_CALL=${OPENAI_REAL_CALL:-false}"
            echo "OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-nano}"
            echo "OPENAI_MAX_OUTPUT_TOKENS=${OPENAI_MAX_OUTPUT_TOKENS:-120}"
          } >> .env
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REAL_CALL: ${{ vars.OPENAI_REAL_CALL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS }}

      - name: Run autonomy loop (constitution + agent pair smoke)
        id: autonomy
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REAL_CALL: ${{ vars.OPENAI_REAL_CALL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
        run: |
          set +e
          EXIT_CODE=0
          mkdir -p .ops

          chmod +x tools/repo_sweep.sh tools/main_hub_final_check.sh tools/validate_env_fuse.sh
          bash tools/repo_sweep.sh --strict || EXIT_CODE=$?
          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            bash tools/main_hub_final_check.sh || EXIT_CODE=$?
          fi
          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            bash tools/validate_env_fuse.sh || EXIT_CODE=$?
          fi

          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            node tools/agent_pair_smoke.js || EXIT_CODE=$?
          fi

          echo "exit_code=${EXIT_CODE}" >> "${GITHUB_OUTPUT}"
          if [[ "${EXIT_CODE}" -ne 0 ]]; then
            echo "Autonomy loop failed: ${EXIT_CODE}"
            exit "${EXIT_CODE}"
          fi

      - name: Generate natural report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ops
          node tools/generate_natural_ops_report.js

      - name: Create run contract
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ops
          EXIT_CODE="${{ steps.autonomy.outputs.exit_code }}"
          if [[ -z "${EXIT_CODE}" ]]; then
            EXIT_CODE="1"
          fi

          STATUS="success"
          if [[ "${EXIT_CODE}" != "0" ]]; then
            STATUS="failure"
          fi

          CREATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > .ops/run_contract.json <<JSON
          {
            "run_id": "${{ github.run_id }}-${{ github.run_attempt }}",
            "risk_level": "low",
            "human_gate_required": false,
            "approved_by": "",
            "artifacts": [
              ".ops/agent_pair_trace.json",
              ".ops/natural_ops_report.md",
              ".ops/run_contract.json"
            ],
            "status": "${STATUS}",
            "source": "autonomy-99-remote",
            "created_at": "${CREATED_AT}"
          }
          JSON

      - name: Validate run contract
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node tools/validate_run_contract.js

      - name: Upload trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-99-trace
          path: .ops/agent_pair_trace.json
          if-no-files-found: ignore

      - name: Upload natural report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-99-natural-report
          path: .ops/natural_ops_report.md
          if-no-files-found: ignore

      - name: Upload run-contract artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-99-run-contract
          path: .ops/run_contract.json
          if-no-files-found: error

      - name: Job summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "## Autonomy 99 Remote Result" >> "${GITHUB_STEP_SUMMARY}"
          echo "- exit_code: ${{ steps.autonomy.outputs.exit_code }}" >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f .ops/natural_ops_report.md ]]; then
            echo "- natural_report:" >> "${GITHUB_STEP_SUMMARY}"
            sed -n '1,80p' .ops/natural_ops_report.md >> "${GITHUB_STEP_SUMMARY}"
          fi
